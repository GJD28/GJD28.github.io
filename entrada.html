<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gabinete de Juicio y Debate</title>

  <meta id="meta-description" name="description" content="Crítica y análisis de cine en Gabinete de Juicio y Debate.">

  <!-- Open Graph -->
  <meta property="og:title" content="Gabinete de Juicio y Debate">
  <meta property="og:description" content="Crítica y análisis de cine en Gabinete de Juicio y Debate.">
  <meta property="og:type" content="article">
  <meta property="og:image" content="">
  <meta property="og:site_name" content="Gabinete de Juicio y Debate">

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>

  <div class="banner-texto">
    <h1>Gabinete de Juicio y Debate</h1>
  </div>

  <nav>
    <ul class="nav-list">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="criticas.html">Críticas</a></li>
      <li><a href="articulos.html">Artículos</a></li>
      <li><a href="rumores.html">Rumores</a></li>
      <li><a href="autores.html">Autores</a></li>
    </ul>
  </nav>

</header>

<main>
  <article id="entrada"></article>
</main>

<footer>
  © 2026 · Gabinete de Juicio y Debate
</footer>

<script src="contenido.js"></script>

<script>

/* ---------------------------
   OBTENER ID DE LA URL
--------------------------- */

function obtenerId(){
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}


/* ---------------------------
   RENDER ESTRELLAS
--------------------------- */

function renderEstrellas(nota){

  const estrellasTotales = 5;
  let html = '<div class="stars">';

  for(let i = 1; i <= estrellasTotales; i++){

    if(nota >= i){
      html += '<span class="star full">★</span>';
    }

    else if(nota >= i - 0.5){
      html += '<span class="star half">★</span>';
    }

    else{
      html += '<span class="star">★</span>';
    }

  }

  html += "</div>";
  return html;

}


/* ---------------------------
   RENDER ENTRADA
--------------------------- */

function renderEntrada(entrada){

  const meta = document.getElementById("meta-description");

  if(meta && entrada.entradilla){
    meta.setAttribute("content", entrada.entradilla);
  }

  const tipo = entrada.seccion === "criticas"
    ? "Crítica"
    : entrada.seccion === "articulos"
    ? "Artículo"
    : "Rumor";

  document.title = `${entrada.titulo} – ${tipo} | Gabinete de Juicio y Debate`;

  /* OPEN GRAPH DINÁMICO */

  const ogTitle = document.querySelector('meta[property="og:title"]');
  const ogDesc = document.querySelector('meta[property="og:description"]');
  const ogImage = document.querySelector('meta[property="og:image"]');

  if(ogTitle){
    ogTitle.setAttribute("content", `${entrada.titulo} – ${tipo} | Gabinete de Juicio y Debate`);
  }

  if(ogDesc && entrada.entradilla){
    ogDesc.setAttribute("content", entrada.entradilla);
  }

  if(ogImage && entrada.imagen){
    ogImage.setAttribute("content", entrada.imagen.src);
  }

  const contenedor = document.getElementById("entrada");
  const autorURL = encodeURIComponent(entrada.autor);

  /* COLOR HEADER SEGÚN SECCIÓN */

  const header = document.querySelector("header");

  if(entrada.seccion === "criticas"){
    header.classList.add("header-criticas");
  }

  else if(entrada.seccion === "articulos"){
    header.classList.add("header-articulos");
  }

  else if(entrada.seccion === "rumores"){
    header.classList.add("header-rumores");
  }

  let html = `
    <h2>${entrada.titulo}</h2>

    <div class="meta">
      Por <a href="autor.html?nombre=${autorURL}">${entrada.autor}</a>
      ${entrada.fecha_publicacion && entrada.fecha_publicacion !== "—"
        ? `· ${entrada.fecha_publicacion}`
        : ``}
    </div>
  `;


  /* IMAGEN */

  if(entrada.imagen){

    html += `
      <img
        src="${entrada.imagen.src}"
        alt="${entrada.imagen.alt}"
        class="imagen-articulo"
        loading="lazy"
        width="1024"
        height="1536"
      >
    `;

  }


  /* CONTENIDO TEXTO */

  entrada.contenido.forEach(bloque => {

    if(bloque.tipo === "texto"){
      html += `<p>${bloque.valor}</p>`;
    }

  });


  /* VALORACIÓN */

  if(entrada.seccion === "criticas" && entrada.nota !== undefined){

    html += `
      <div class="valoracion">
        <strong>Valoración:</strong>
        ${renderEstrellas(entrada.nota)}
      </div>
    `;

  }


  /* ETIQUETAS */

  if(entrada.etiquetas && entrada.etiquetas.length > 0){

    html += `
      <div class="etiquetas">
        <strong>Etiquetas:</strong>
        ${entrada.etiquetas.map(e => {

          const slug = e
            .toLowerCase()
            .replace(/\s+/g,"-");

          return `
            <a class="etiqueta"
               href="etiqueta.html?tag=${encodeURIComponent(slug)}">
              ${e}
            </a>
          `;

        }).join(" ")}
      </div>

      <div class="ver-todas-etiquetas">
        <a href="etiquetas.html">Explorar todas las etiquetas</a>
      </div>
    `;

  }


  contenedor.innerHTML = html;

}


/* ---------------------------
   INICIALIZACIÓN
--------------------------- */

const id = obtenerId();
const entrada = contenido.find(e => e.id === id);

if(entrada){

  renderEntrada(entrada);

}

else{

  document.getElementById("entrada").innerHTML =
    "<p>La entrada que buscas no existe.</p>";

}

</script>

</body>
</html>
