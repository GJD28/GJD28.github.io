<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sin resultados</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header-inicio">

  <div class="banner-texto">

    <h1>Sin resultados</h1>

    <div class="buscador">
      <input type="text" id="buscador-input" placeholder="Buscar..." autocomplete="off">
      <div id="sugerencias-busqueda" class="sugerencias-busqueda"></div>
    </div>

  </div>

</header>

<main style="text-align:center; padding:3rem;">

  <h2>No se encontraron resultados</h2>

  <p id="texto-busqueda"></p>

  <a href="index.html" style="display:inline-block; margin-top:1.5rem;">
    Volver al inicio
  </a>

</main>

<footer>
  © 2026 · Gabinete de Juicio y Debate
</footer>

<script src="contenido.js"></script>
<script src="buscador.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const query = params.get("q");

if(query){
  document.getElementById("texto-busqueda").textContent =
    'No hay resultados para: "' + query + '"';
}
</script>

</body>
</html>
