<main>

  <section class="portada-bloque">

    <h2>Destacados</h2>

    <div class="carousel">

      <button class="carousel-btn prev destacados-prev">‹</button>

      <div class="carousel-track" id="destacados"></div>

  <section class="portada-bloque">

    <div class="carousel">

      <button class="carousel-btn prev ultimas-prev">‹</button>

    </div>

  </section>

<footer>
  © 2026 · Gabinete de Juicio y Debate
</footer>


<script src="contenido.js"></script>

<script>

document.addEventListener('DOMContentLoaded', () => {

  function cargarCarrusel(trackId, prevClass, nextClass, entradas){

    const track = document.getElementById(trackId);
    const prev = document.querySelector("." + prevClass);
    const next = document.querySelector("." + nextClass);

    track.innerHTML = "";

    entradas.forEach(e => {

      track.appendChild(crearTarjeta(e,"inicio"));

    });

    prev.addEventListener("click", () => {

      track.scrollBy({left:-300,behavior:"smooth"});

    });

    next.addEventListener("click", () => {

      track.scrollBy({left:300,behavior:"smooth"});

    });

  }

/* DESTACADOS AUTOMÁTICOS */

const ultimaCritica = contenidoOrdenado.find(e => e.seccion === "criticas");
const ultimoArticulo = contenidoOrdenado.find(e => e.seccion === "articulos");
const ultimoRumor = contenidoOrdenado.find(e => e.seccion === "rumores");

const automaticos = [
  ultimaCritica,
  ultimoArticulo,
  ultimoRumor
].filter(Boolean);


/* DESTACADOS MANUALES */

const manuales = contenidoOrdenado
  .filter(e => e.destacada === true)
  .filter(e => !automaticos.some(a => a.id === e.id))
  .slice(0,7);


/* COMBINAR DESTACADOS */

const destacados = [...automaticos, ...manuales].slice(0,10);


/* CARGAR CARRUSEL */

cargarCarrusel("destacados","destacados-prev","destacados-next",destacados);


  const ultimas = contenidoOrdenado.slice(0,10);


  cargarCarrusel("ultimas-entradas","ultimas-prev","ultimas-next",ultimas);

});

</script>

</body>
