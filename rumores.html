<script src="contenido.js"></script>

<script>

const grid = document.getElementById("rumores-grid");
const boton = document.getElementById("boton-mas-rumores");

let visibles = 12;

const rumoresOrdenados = contenidoOrdenado.filter(e => e.seccion === "rumores");

function pintarRumores(){

  grid.innerHTML = "";

  rumoresOrdenados.slice(0,visibles).forEach(rumor=>{

    const item = document.createElement("article");

    item.className = "rumor-card";

    item.innerHTML = `
      <a href="entrada.html?id=${rumor.id}">
        <div class="rumor-imagen">
          <img src="${rumor.imagen.src}" alt="${rumor.imagen.alt}">
        </div>
        <h3>${rumor.titulo}</h3>
      </a>
    `;

    grid.appendChild(item);

  });

}

pintarRumores();

boton.addEventListener("click",()=>{

  visibles += 12;

  pintarRumores();

});

</script>
