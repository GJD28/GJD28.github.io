<body>



<header class="header-etiquetas">

<div class="banner-texto">

<h1>Todas las etiquetas</h1>

<div class="buscador">
<input type="text" id="buscador-input" placeholder="Buscar..." autocomplete="off">
<div id="sugerencias-busqueda" class="sugerencias-busqueda"></div>
</div>

</div>

<nav>
<ul class="nav-list">
<li><a href="index.html">Inicio</a></li>

<li><a href="rumores.html">Rumores</a></li>
<li><a href="autores.html">Autores</a></li>
</ul>
</nav>

</header>

<main>

<section class="portada-bloque">

<h2>Explorar por temas</h2>

<div id="lista-etiquetas" class="lista-etiquetas"></div>

</section>

</main>

<footer>
© 2026 · Gabinete de Juicio y Debate
</footer>

<script src="contenido.js"></script>

<script>

document.addEventListener("DOMContentLoaded", () => {

function slugify(texto){

return texto
.toLowerCase()
.replace(/\s+/g,"-");

}


/* CONTADOR DE ETIQUETAS */

let contador = {};

contenido.forEach(e => {

if(e.etiquetas){

e.etiquetas.forEach(et => {

if(!contador[et]){
contador[et] = 0;
}

contador[et]++;

});

}

});


/* ORDEN ALFABÉTICO */

const etiquetas = Object.keys(contador);

etiquetas.sort((a,b) => a.localeCompare(b,"es"));


/* CREAR LISTA */

const contenedor = document.getElementById("lista-etiquetas");

etiquetas.forEach(et => {

const slug = slugify(et);

const enlace = document.createElement("a");

enlace.href = "etiqueta.html?tag=" + encodeURIComponent(slug);
enlace.textContent = et + " (" + contador[et] + ")";
enlace.className = "etiqueta-indice";

contenedor.appendChild(enlace);

});

});

</script>

</body>
</html>
