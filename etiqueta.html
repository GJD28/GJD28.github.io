<head>
  <meta charset="UTF-8" />

</head>

<body>

<header class="header-articulos">

  <div class="banner-texto">
    <h1 id="titulo-etiqueta"></h1>
  </div>

  <nav>
    <ul class="nav-list">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="criticas.html">Críticas</a></li>

      <li><a href="autores.html">Autores</a></li>
    </ul>
  </nav>

</header>

<main>

  <section class="portada-bloque">

    <h2>Entradas con esta etiqueta</h2>

    <div class="carousel">

      <button class="carousel-btn prev etiqueta-prev">‹</button>

      <div class="carousel-track" id="entradas-etiqueta"></div>

      <button class="carousel-btn next etiqueta-next">›</button>

    </div>

  </section>

</main>

<footer>
  © 2026 · Gabinete de Juicio y Debate
</footer>

<script src="contenido.js"></script>

<script>

document.addEventListener('DOMContentLoaded', () => {

  const params = new URLSearchParams(window.location.search);
  const tag = params.get("tag");

  document.getElementById("titulo-etiqueta").textContent = "Etiqueta: " + tag;

  function cargarCarrusel(trackId, prevClass, nextClass, entradas){

    const track = document.getElementById(trackId);
    const prev = document.querySelector("." + prevClass);
    const next = document.querySelector("." + nextClass);

    track.innerHTML = "";

    entradas.forEach(e => {

      track.appendChild(crearTarjeta(e,"normal"));

    });

    prev.addEventListener("click", () => {

      track.scrollBy({left:-300,behavior:"smooth"});

    });

    next.addEventListener("click", () => {

      track.scrollBy({left:300,behavior:"smooth"});

    });

  }

  const filtradas = contenido.filter(e => 
    e.etiquetas && e.etiquetas.includes(tag)
  );

  cargarCarrusel("entradas-etiqueta","etiqueta-prev","etiqueta-next",filtradas);

});

</script>

</body>
</html>
