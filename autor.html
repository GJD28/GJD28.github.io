<header class="header-inicio">

<div class="banner-texto">
<h1>Gabinete de Juicio y Debate</h1>
</div>

<nav>
<ul class="nav-list">
<li><a href="index.html">Inicio</a></li>
<li><a href="criticas.html">Críticas</a></li>
<li><a href="articulos.html">Artículos</a></li>
<li><a href="rumores.html">Rumores</a></li>
<li><a href="autores.html">Autores</a></li>
</ul>
</nav>

<div class="buscador">
<input type="text" id="buscador-input" placeholder="Buscar..." autocomplete="off">
<div id="sugerencias-busqueda" class="sugerencias-busqueda"></div>
</div>

</header>
  
</header>

<main>

  <!-- CABECERA DEL AUTOR -->

  <section id="autor-cabecera"></section>


  <!-- ENTRADAS DEL AUTOR -->

  <section id="autor">

    <div class="carousel autor-carousel">

      <button class="carousel-btn prev">‹</button>

      <div class="carousel-track"></div>

      <button class="carousel-btn next">›</button>

    </div>

  </section>

</main>

<footer>
  © 2026 · Gabinete de Juicio y Debate
</footer>

<script src="contenido.js"></script>

<script>

function obtenerAutor(){

  const params = new URLSearchParams(window.location.search);

  return params.get("nombre");

}

const autor = obtenerAutor();

const cabecera = document.getElementById("autor-cabecera");

const track = document.querySelector(".autor-carousel .carousel-track");


if(!autor){

  cabecera.innerHTML = "<p>Autor no especificado</p>";

}else{

  const ficha = fichasAutores[autor];

  if(ficha){

    cabecera.innerHTML = `

      <div class="autor-header">

        <img src="${ficha.foto}" alt="${ficha.nombre}">

        <div class="autor-bio">

          <h2>${ficha.nombre}</h2>

          <p>${ficha.bio.replace(/\n\n/g,"<br><br>")}</p>

        </div>

      </div>

    `;

  }


 const entradasAutor = contenidoOrdenado.filter(e => e.autor === autor);


  if(entradasAutor.length === 0){

    track.innerHTML = "<p>Este autor aún no tiene textos publicados.</p>";

  }else{


    entradasAutor.forEach(entrada => {

      let tipoClase = "";
      let tipoTexto = "";

      if(entrada.seccion === "criticas"){

        tipoClase = "tipo-critica";
        tipoTexto = "CRÍTICA";

      }else if(entrada.seccion === "articulos"){

        tipoClase = "tipo-articulo";
        tipoTexto = "ARTÍCULO";

      }else if(entrada.seccion === "rumores"){

        tipoClase = "tipo-rumor";
        tipoTexto = "RUMOR";

      }


      const item = document.createElement("div");

      item.className = "carousel-item";


      item.innerHTML = `

        <a href="entrada.html?id=${entrada.id}">

          <div class="miniatura-wrapper">

            <img src="${entrada.imagen.src}" alt="${entrada.imagen.alt}">

            <div class="miniatura-banner ${tipoClase}">

              ${tipoTexto}

            </div>

          </div>

          <h3>${entrada.titulo}</h3>

        </a>

      `;


      track.appendChild(item);

    });

  }

}


const prevBtn = document.querySelector(".autor-carousel .prev");

const nextBtn = document.querySelector(".autor-carousel .next");


prevBtn.addEventListener("click",()=>{

  track.scrollBy({left:-300,behavior:"smooth"});

});


nextBtn.addEventListener("click",()=>{

  track.scrollBy({left:300,behavior:"smooth"});

});

</script>

</body>
</html>
